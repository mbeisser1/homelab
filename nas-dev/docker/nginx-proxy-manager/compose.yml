volumes:
  data:
    name: networking_nginx-proxy-manager_data
    external: true
  letsencrypt:
    name: networking_nginx-proxy-manager_letsencrypt
    external: true

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.12.6
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 81:81
    volumes:
      - data:/data
      - letsencrypt:/etc/letsencrypt
