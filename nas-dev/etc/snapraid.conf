# SnapRAID configuration file

# Parity file
# Must point to an empty directory on the parity disk
parity /mnt/par1/snapraid.parity
2-parity /mnt/par2/snapraid.parity

# Content files
# It's a good idea to have one per data disk (but not the parity disk)
content /mnt/vol1/snapraid.content
content /mnt/vol2/snapraid.content
content /mnt/vol3/snapraid.content
content /mnt/vol4/snapraid.content
content /mnt/par1/snapraid.content  

# Data disks
# Use labels to describe each disk (must be unique)
# Point to the root of each disk, or to a subfolder like 'pool' if you only use part of the disk
data d1 /mnt/vol1/pool
data d2 /mnt/vol2/pool
data d3 /mnt/vol3/pool
data d4 /mnt/vol4/pool

# Exclude patterns - files that shouldn't be protected by parity
# Note: patterns starting with / are absolute (match from the root data drive) 
# /.cache/ matches /mnt/vol1/pool/.cache/

## SnapRAID recovery files
exclude *.unrecoverable
exclude /snapraid.content
exclude /snapraid.content.bak

## Skip files/folders that shouldn't be protected
exclude *.tmp
exclude *.temp
exclude /lost+found/
exclude /tmp/
exclude /.Trash-*/
exclude /.cache/
exclude /.local/share/Trash/
exclude /gaming/batocera/userdata/system/

# Autosave: Creates checkpoint every 250-GB during sync operations
# Allows resuming from last checkpoint if sync is interrupted (power failure, disk failure, etc.)
# With minimal daily changes (<20GB), this rarely triggers on routine syncs
# Primarily protects during: initial sync, large additions, recovery operations, or reorganizations
autosave 250
